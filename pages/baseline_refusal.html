<!DOCTYPE html>
<html>
<head>
    <title>Baseline Refusal Page</title>
    <style>
        body {
            font-family: "Segoe UI", sans-serif;
            max-width: 760px;
            margin: 40px auto;
            padding: 24px;
            background: #f6f7fb;
            color: #1e2430;
        }
        .panel {
            background: #ffffff;
            border: 1px solid #d9deea;
            border-radius: 18px;
            padding: 28px;
            box-shadow: 0 20px 40px rgba(36, 49, 79, 0.08);
        }
        h1 {
            margin-top: 0;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }
        input {
            width: 100%;
            padding: 12px 14px;
            border-radius: 12px;
            border: 1px solid #bfc9de;
            box-sizing: border-box;
            font-size: 15px;
        }
        button {
            margin-top: 20px;
            padding: 12px 16px;
            border: none;
            border-radius: 12px;
            background: #2952cc;
            color: white;
            font-size: 15px;
        }
    </style>
</head>
<body>
<section class="panel">
    <h1>Release Approval</h1>
    <label for="project-code">Project Code</label>
    <input id="project-code" type="text" placeholder="XR-42" />
    <button id="approve-btn" type="button">Approve Release</button>
</section>
</body>
</html>
