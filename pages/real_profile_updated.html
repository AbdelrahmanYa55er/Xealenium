<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Real Profile Updated</title>
    <style>
        body {
            font-family: "Segoe UI", Arial, sans-serif;
            background: #eef3f8;
            color: #172033;
            margin: 0;
            padding: 42px 18px;
        }
        .account-shell {
            max-width: 680px;
            margin: 0 auto;
            background: #ffffff;
            border: 1px solid #d7e0ed;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(30, 45, 80, 0.12);
            padding: 30px;
        }
        h1 {
            margin: 0 0 8px;
            font-size: 28px;
            color: #18233a;
        }
        .intro {
            margin: 0 0 24px;
            color: #607089;
        }
        .entry {
            margin-bottom: 15px;
        }
        .field-title {
            display: block;
            margin-bottom: 6px;
            color: #33435f;
            font-weight: 650;
        }
        .editable,
        .team-control {
            box-sizing: border-box;
            width: 100%;
            min-height: 42px;
            border: 1px solid #b8c5d8;
            border-radius: 6px;
            background: #ffffff;
            padding: 9px 11px;
            color: #172033;
            font-size: 14px;
        }
        .editable:focus,
        .team-control:focus {
            border-color: #2563eb;
            outline: 2px solid #bfdbfe;
        }
        .editable[data-placeholder]:empty::before,
        .team-control[data-placeholder]:empty::before {
            content: attr(data-placeholder);
            color: #7b8798;
        }
        .switch-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 16px 0;
            cursor: pointer;
        }
        .switch-box {
            width: 18px;
            height: 18px;
            box-sizing: border-box;
            border: 2px solid #2563eb;
            border-radius: 5px;
            background: #ffffff;
        }
        .switch-row[aria-checked="true"] .switch-box {
            background: #2563eb;
            box-shadow: inset 0 0 0 3px #ffffff;
        }
        .update-action {
            display: block;
            box-sizing: border-box;
            width: 100%;
            min-height: 46px;
            margin-top: 18px;
            border-radius: 6px;
            background: #2563eb;
            color: #ffffff;
            cursor: pointer;
            font-size: 15px;
            font-weight: 750;
            text-align: center;
            text-decoration: none;
            padding: 13px 12px;
        }
        #account-status {
            margin-top: 14px;
            min-height: 20px;
            color: #256c3b;
            font-weight: 650;
        }
    </style>
</head>
<body>
<main class="account-shell" role="form" aria-labelledby="account-title">
    <h1 id="account-title">Account Details</h1>
    <p class="intro">Manage the core account details used across your workspace.</p>

    <div class="entry">
        <span class="field-title">Complete Name</span>
        <div id="complete_name_new" class="editable" role="textbox" aria-label="Complete Name" contenteditable="true" tabindex="0" data-placeholder="Alex Morgan"></div>
    </div>

    <div class="entry">
        <span class="field-title">Primary Email</span>
        <div class="editable" role="textbox" aria-label="Primary Email" contenteditable="true" tabindex="0" data-placeholder="alex@example.com"></div>
    </div>

    <div class="entry">
        <span class="field-title">Phone Contact</span>
        <div class="editable" role="textbox" aria-label="Phone Contact" contenteditable="true" tabindex="0" data-placeholder="+1 555 0100"></div>
    </div>

    <div class="entry">
        <span class="field-title">Role</span>
        <div class="editable" role="textbox" aria-label="Role" contenteditable="true" tabindex="0" data-placeholder="Product Manager"></div>
    </div>

    <div class="entry">
        <span class="field-title">Team</span>
        <div class="team-control" role="combobox" aria-label="Team" aria-expanded="false" aria-haspopup="listbox" contenteditable="true" tabindex="0" data-placeholder="Product"></div>
    </div>

    <div class="switch-row" role="checkbox" aria-label="Receive notifications" aria-checked="false" tabindex="0"
         onclick="this.setAttribute('aria-checked', this.getAttribute('aria-checked') === 'true' ? 'false' : 'true')">
        <div class="switch-box"></div>
        <span>Receive notifications</span>
    </div>

    <div class="switch-row" role="switch" aria-label="Use two-step verification" aria-checked="false" tabindex="0"
         onclick="this.setAttribute('aria-checked', this.getAttribute('aria-checked') === 'true' ? 'false' : 'true')">
        <div class="switch-box"></div>
        <span>Use two-step verification</span>
    </div>

    <a class="update-action" role="button" tabindex="0"
       onclick="document.getElementById('account-status').textContent='Account updated'; window.realProfileUpdated = true;">
        Update Account
    </a>
    <div id="account-status" aria-live="polite"></div>
</main>
</body>
</html>
