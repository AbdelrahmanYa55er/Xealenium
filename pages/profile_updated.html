<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Profile Updated Page</title>
    <style>
        body {
            font-family: "Segoe UI", Arial, sans-serif;
            background: #eef3f8;
            color: #172033;
            margin: 0;
            padding: 40px 18px;
        }
        .account-panel {
            max-width: 620px;
            margin: 0 auto;
            background: #ffffff;
            border: 1px solid #d7e0ed;
            border-radius: 8px;
            padding: 28px;
            box-shadow: 0 8px 28px rgba(22, 38, 64, 0.12);
        }
        h1 {
            margin: 0 0 22px;
            font-size: 26px;
        }
        .entry {
            margin-bottom: 14px;
        }
        .field-title {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
            color: #34425c;
        }
        .editable,
        .team-picker {
            width: 100%;
            box-sizing: border-box;
            min-height: 40px;
            border: 1px solid #b9c5d6;
            border-radius: 6px;
            padding: 9px 10px;
            font-size: 14px;
            background: #ffffff;
        }
        .editable:focus,
        .team-picker:focus {
            outline: 2px solid #93c5fd;
            border-color: #2563eb;
        }
        .editable[data-placeholder]:empty::before,
        .team-picker[data-placeholder]:empty::before {
            content: attr(data-placeholder);
            color: #7d8aa0;
        }
        .toggle {
            display: flex;
            align-items: center;
            gap: 9px;
            margin: 14px 0;
            cursor: pointer;
        }
        .toggle-box {
            width: 18px;
            height: 18px;
            border: 2px solid #2563eb;
            border-radius: 5px;
            background: #ffffff;
        }
        .toggle[aria-checked="true"] .toggle-box {
            background: #2563eb;
            box-shadow: inset 0 0 0 3px #ffffff;
        }
        .update-action {
            display: block;
            width: 100%;
            box-sizing: border-box;
            min-height: 44px;
            margin-top: 18px;
            border-radius: 6px;
            background: #2563eb;
            color: #ffffff;
            font-weight: 700;
            font-size: 15px;
            text-align: center;
            text-decoration: none;
            padding: 12px;
            cursor: pointer;
        }
    </style>
</head>
<body>
<main class="account-panel" role="form" aria-labelledby="account-title">
    <h1 id="account-title">Account Details</h1>

    <div class="entry">
        <span class="field-title">Complete Name</span>
        <div id="complete_name_new" class="editable" contenteditable="true" tabindex="0" data-placeholder="Alex Morgan"></div>
    </div>

    <div class="entry">
        <span class="field-title">Primary Email</span>
        <div class="editable" contenteditable="true" tabindex="0" data-placeholder="alex@example.com"></div>
    </div>

    <div class="entry">
        <span class="field-title">Phone Contact</span>
        <div class="editable" contenteditable="true" tabindex="0" data-placeholder="+1 555 0100"></div>
    </div>

    <div class="entry">
        <span class="field-title">Role</span>
        <div class="editable" contenteditable="true" tabindex="0" data-placeholder="Product Manager"></div>
    </div>

    <div class="entry">
        <span class="field-title">Team</span>
        <div class="team-picker" role="combobox" aria-label="Team department" contenteditable="true" tabindex="0" data-placeholder="Product"></div>
    </div>

    <div class="toggle" role="checkbox" aria-label="Receive notifications" aria-checked="true" tabindex="0"
         onclick="this.setAttribute('aria-checked', this.getAttribute('aria-checked') === 'true' ? 'false' : 'true')">
        <div class="toggle-box"></div>
        <span>Receive notifications</span>
    </div>

    <div class="toggle" role="checkbox" aria-label="Use two-step verification" aria-checked="false" tabindex="0"
         onclick="this.setAttribute('aria-checked', this.getAttribute('aria-checked') === 'true' ? 'false' : 'true')">
        <div class="toggle-box"></div>
        <span>Use two-step verification</span>
    </div>

    <a class="update-action" role="button" tabindex="0" onclick="window.profileUpdated = true">Update Account</a>
</main>
</body>
</html>
