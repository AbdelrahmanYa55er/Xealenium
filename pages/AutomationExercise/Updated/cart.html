<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Automation Exercise - Cart Review</title>

<style>
body { font-family: Arial, Helvetica, sans-serif; background: #f6f6f6; color: #333; margin: 0; }
.header { background: #fff; border-bottom: 1px solid #eee; padding: 18px 40px; display: flex; justify-content: space-between; align-items: center; }
.logo { font-size: 26px; color: #fe980f; font-weight: 700; }
.nav a { color: #555; margin-left: 20px; text-decoration: none; }
.nav a.active { color: #fe980f; }
.container { max-width: 1080px; margin: 34px auto; background: #fff; padding: 28px; border: 1px solid #eee; }
h1, h2, h3 { color: #333; }
.heading { color: #fe980f; text-transform: uppercase; }
.btn, button { background: #fe980f; color: #fff; border: 0; padding: 10px 18px; text-decoration: none; display: inline-block; cursor: pointer; }
.btn-default { background: #fe980f; color: #fff; }
.field { margin-bottom: 16px; }
label { display: block; font-weight: 700; margin-bottom: 6px; }
input, textarea, select, .editable { border: 1px solid #ddd; padding: 10px; min-height: 22px; width: 100%; box-sizing: border-box; background: #fff; }
.cart-table { width: 100%; border-collapse: collapse; }
.cart-table th { background: #fe980f; color: #fff; padding: 12px; text-align: left; }
.cart-table td { border-bottom: 1px solid #eee; padding: 14px; vertical-align: middle; }
.summary { border: 1px solid #eee; padding: 18px; margin-top: 22px; }
.card { border: 1px solid #eee; padding: 16px; margin-bottom: 14px; background: #fff; }
.product-grid { display: grid; grid-template-columns: repeat(3, minmax(180px, 1fr)); gap: 18px; }
.product-card { border: 1px solid #eee; padding: 18px; text-align: center; background: #fff; }
.price { color: #fe980f; font-size: 20px; font-weight: 700; }
.status { border: 1px solid #cde8cd; background: #f2fff2; padding: 20px; text-align: center; }
</style>

<link href="../assets/css/automation-exercise-fixture.css" rel="stylesheet">
</head>
<body>

<header class="header">
  <div class="logo">Automation Exercise</div>
  <nav class="nav">
    <span>Home</span>
    <span>Products</span>
    <span>Cart</span>
    <span>Signup / Login</span>
  </nav>
</header>


<main class="container cart-review">
  <h2 class="heading">Cart Review</h2>
  <section class="cart-list" aria-label="Cart items">
    <article class="cart-card" data-product-id="1">
      <a href="/product_details/1"><strong>Blue Top</strong></a>
      <span class="price">Rs. 500</span>
      <span aria-label="Quantity">Qty 1</span>
      <strong aria-label="Line total">Rs. 500</strong>
      <a href="#remove-1" class="remove-item" data-product-id="1" aria-label="Remove Blue Top">Remove</a>
    </article>
    <article class="cart-card" data-product-id="2">
      <a href="/product_details/2"><strong>Men Tshirt</strong></a>
      <span class="price">Rs. 400</span>
      <span aria-label="Quantity">Qty 1</span>
      <strong aria-label="Line total">Rs. 400</strong>
      <a href="#remove-2" class="remove-item" data-product-id="2" aria-label="Remove Men Tshirt">Remove</a>
    </article>
  </section>
  <section class="summary checkout-summary" aria-label="Cart totals">
    <p>Subtotal: <strong>Rs. 900</strong></p>
    <p>Delivery: <strong>Free</strong></p>
    <p>Grand Total: <strong>Rs. 900</strong></p>
    <a href="/checkout" class="checkout-continue" role="button" aria-label="Proceed to checkout">Proceed to Checkout</a>
  </section>
</main>

</body>
</html>
