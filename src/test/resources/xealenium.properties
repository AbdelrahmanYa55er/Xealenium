test.page=updated
visual.captureBaseline=false
visual.captureBaseline.refresh=false
report=true
interactive=false
headless=false
visual.threshold=0.70

# Optional custom artifact locations.
# Leave blank to keep the default root-level report behavior used by older demos.
visual.report.json.path=

# Candidate selection weights for visual scoring.
# These preserve the current scoring behavior; tune carefully for competition experiments.
visual.weight.visual=0.09
visual.weight.position=0.07
visual.weight.text=0.06
visual.weight.kind=0.10
visual.weight.sequence=0.04
visual.weight.role=0.14
visual.weight.autocomplete=0.08
visual.weight.semantic=0.20
visual.weight.field=0.22
visual.weight.embedding=0.12
visual.scoring.maxDistance=600.0

# Visual embedding configuration
visual.embedding.enabled=true
visual.embedding.modelName=gte-small
visual.embedding.modelPath=models/gte-small-onnx/model.onnx
